<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - ArgonWatchGo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .setup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .setup-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .setup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .setup-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .setup-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .setup-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-checkbox label {
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .btn-setup {
            width: 100%;
            padding: 12px 24px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-setup:hover {
            opacity: 0.9;
        }

        .btn-setup:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .qr-section {
            display: none;
            text-align: center;
            margin-top: 24px;
            padding: 24px;
            background: var(--bg-primary);
            border-radius: 8px;
        }

        .qr-section.show {
            display: block;
        }

        .qr-code {
            margin: 20px auto;
            max-width: 256px;
        }

        .qr-code img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .secret-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 6px;
            margin: 16px 0;
            word-break: break-all;
        }

        .info-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 16px;
        }

        .password-strength {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: width 0.3s, background-color 0.3s;
            width: 0%;
        }

        .password-strength-bar.weak {
            background: #ef4444;
            width: 33%;
        }

        .password-strength-bar.medium {
            background: #f59e0b;
            width: 66%;
        }

        .password-strength-bar.strong {
            background: #10b981;
            width: 100%;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <div class="setup-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    ArgonWatchGo
                </div>
                <h1 class="setup-title">Initial Setup</h1>
                <p class="setup-subtitle">Create your admin account to get started</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="setup-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Choose a username" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Choose a strong password"
                        required autocomplete="new-password">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="password-strength-bar"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password"
                        required autocomplete="new-password">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="enable-2fa">
                    <label for="enable-2fa">Enable Two-Factor Authentication (Recommended)</label>
                </div>
                <button type="submit" class="btn-setup" id="setup-btn">Create Account</button>
            </form>

            <div id="qr-section" class="qr-section">
                <h3 style="margin-bottom: 16px;">Scan QR Code</h3>
                <p class="info-text">Scan this QR code with your authenticator app (Google Authenticator, Authy, etc.)
                </p>
                <div class="qr-code" id="qr-code"></div>
                <p class="info-text">Or manually enter this secret:</p>
                <div class="secret-code" id="secret-code"></div>
                <button class="btn-setup" id="continue-btn">Continue to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="js/setup.js"></script>
</body>

</html>
